name: Generate Video

on:
  push:
    branches:
      - 'ci/video-generate'
  workflow_dispatch:
    inputs:
      zhihu_url:
        description: '知乎问题页 URL（须为 https://www.zhihu.com/question/<id>）'
        required: true
        type: string

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 90  # Set timeout for video generation (may take 30-60 minutes)
    # Manual: inputs.zhihu_url. Push (ci/video-generate only): vars.ZHIHU_DEFAULT_URL (https://www.zhihu.com/question/...).
    env:
      ZHIHU_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.zhihu_url || vars.ZHIHU_DEFAULT_URL }}
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
      PUPPETEER_EXECUTABLE_PATH: '/usr/bin/chromium-browser'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Node.js dependencies
        run: pnpm install

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            chromium-chromedriver \
            xvfb \
            ffmpeg \
            libgbm-dev \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64

      # Whole file from one Actions secret (copy .env.example → .env locally, fill keys, paste into DOTENV_FILE).
      - name: Create .env from DOTENV_FILE secret
        env:
          DOTENV_FILE: ${{ secrets.DOTENV_FILE }}
        run: |
          if [ -z "${DOTENV_FILE}" ]; then
            echo "::error::secrets.DOTENV_FILE is empty. Add an Actions secret DOTENV_FILE with your full .env text (start from .env.example)."
            exit 1
          fi
          python3 -c "import os; open('.env','w',encoding='utf-8').write(os.environ['DOTENV_FILE'])"

      - name: Create necessary directories
        run: |
          mkdir -p output/tts output/video public/tts public/video

      - name: Set up display server for headless browser
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      # Split from pipeline:zhihu-video so each stage is visible and artifacts are downloadable between steps.
      - name: 'Stage 1/3: Zhihu spider (crawl + script)'
        run: |
          if [ -z "$ZHIHU_URL" ]; then
            echo "::error::ZHIHU_URL is empty. Use workflow input (manual) or set repository variable ZHIHU_DEFAULT_URL (push)."
            exit 1
          fi
          pnpm spider:zhihu -- "$ZHIHU_URL"

      - name: Upload Stage 1 artifact (spider output)
        uses: actions/upload-artifact@v4
        with:
          name: spider-output
          path: output/spider
          retention-days: 14

      - name: 'Stage 2/3: TTS (Edge) + sync to public/tts'
        run: pnpm tts

      - name: Upload Stage 2 artifact (TTS output)
        uses: actions/upload-artifact@v4
        with:
          name: tts-output
          path: |
            output/tts
            public/tts
          retention-days: 14
          if-no-files-found: ignore

      - name: 'Stage 3/3: Remotion render (video.mp4)'
        run: pnpm render:video

      - name: Find generated video file
        id: find-video
        run: |
          VIDEO_FILE="output/video/video.mp4"
          if [ ! -f "$VIDEO_FILE" ]; then
            echo "No video file found at $VIDEO_FILE"
            ls -la output/video/ || echo "output/video directory does not exist"
            exit 1
          fi
          echo "video_path=$VIDEO_FILE" >> $GITHUB_OUTPUT
          echo "Found video: $VIDEO_FILE"

      - name: Upload video as artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-video
          path: ${{ steps.find-video.outputs.video_path }}
          retention-days: 30

